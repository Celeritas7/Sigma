// =============================================================================
// CALCULATIONS
// =============================================================================
function weightedTotal(optionId, scores, parameters, weightOverrides = null) {
  let wSum = 0, vSum = 0
  for (const p of parameters) {
    const w = weightOverrides?.[p.id] ?? Number(p.weight)
    if (w <= 0) continue
    const s = scores.find(sc => sc.option_id === optionId && sc.parameter_id === p.id)
    if (!s || s.value == null) continue
    wSum += w
    vSum += Number(s.value) * w
  }
  return wSum > 0 ? vSum / wSum : null
}

function rankedOptions(options, scores, parameters, weightOverrides = null) {
  return options
    .map(o => ({ ...o, _total: weightedTotal(o.id, scores, parameters, weightOverrides) }))
    .sort((a, b) => (b._total ?? -1) - (a._total ?? -1))
}

function paramContribution(optionId, paramId, scores, parameters, weightOverrides = null) {
  const p = parameters.find(x => x.id === paramId)
  if (!p) return 0
  const w = weightOverrides?.[paramId] ?? Number(p.weight)
  const s = scores.find(sc => sc.option_id === optionId && sc.parameter_id === paramId)
  if (!s || s.value == null) return 0
  return Number(s.value) * w
}

function completeness(parameters, options, scores) {
  const total = parameters.length * options.length
  if (!total) return { filled: 0, total: 0, pct: 0 }
  let filled = 0
  for (const o of options) for (const p of parameters) {
    if (scores.find(s => s.option_id === o.id && s.parameter_id === p.id && s.value != null)) filled++
  }
  return { filled, total, pct: filled / total }
}

// deterministic monte-carlo: ±2 jitter on each weight, count if leader holds
function robustness(parameters, options, scores) {
  const base = rankedOptions(options, scores, parameters)
  if (!base[0] || base[0]._total == null) return null
  const topId = base[0].id
  let holds = 0
  const N = 100
  for (let i = 0; i < N; i++) {
    const over = {}
    for (const p of parameters) {
      const j = Math.sin(i * 31 + Number(p.weight) * 7) * 2
      over[p.id] = Math.max(0, Math.min(10, Number(p.weight) + j))
    }
    const r = rankedOptions(options, scores, parameters, over)
    if (r[0]?.id === topId) holds++
  }
  return holds / N
}

function perWeightSensitivity(parameters, options, scores) {
  const base = rankedOptions(options, scores, parameters)
  if (!base[0]) return []
  const topId = base[0].id
  return parameters.map(p => {
    let flipped = 0; let flipAt = null
    for (let w = 0; w <= 10; w += 0.5) {
      const r = rankedOptions(options, scores, parameters, { [p.id]: w })
      if (r[0]?.id !== topId) { flipped++; if (flipAt == null) flipAt = w }
    }
    return { p, sens: flipped / 21, flipAt }
  })
}

// =============================================================================
// THEME STATE (persisted to localStorage)

const ACCENT_OPTIONS = [

  { name: 'blue',  hue: 260 },

function applyAccent(hue) {

// =============================================================================
// SMALL UI ATOMS
// =============================================================================
function Pill({ children, color, bg, style }) {
  const c = color || 'var(--ink)'
  return <span className="pill" style={{
    background: bg || `color-mix(in oklch, ${c} 14%, var(--bg))`,
    color: c, ...style,
  }}>{children}</span>
}

function InlineText({ value, onCommit, placeholder, style, multiline }) {
  const [draft, setDraft] = useState(value ?? '')
  const [editing, setEditing] = useState(false)
  useEffect(() => setDraft(value ?? ''), [value])
  if (!editing) {
    return <span onClick={() => setEditing(true)} style={{
      cursor: 'text', display: 'inline-block', minHeight: '1em',
      color: value ? (style?.color || 'var(--ink)') : 'var(--ink-faint)',
      fontStyle: value ? 'normal' : 'italic', ...style,
    }}>{value || placeholder || '—'}</span>
  }
  const Tag = multiline ? 'textarea' : 'input'
  return <Tag autoFocus value={draft}
    onChange={e => setDraft(e.target.value)}
    onBlur={() => { setEditing(false); if (draft !== value) onCommit(draft) }}
    onKeyDown={e => { if (e.key === 'Enter' && !multiline) e.target.blur(); if (e.key === 'Escape') { setDraft(value ?? ''); setEditing(false) }}}
    placeholder={placeholder}
    rows={multiline ? 3 : undefined}
    style={{
      ...style, background: 'var(--bg-soft)', border: '1px solid var(--rule)',
      borderRadius: 4, padding: '4px 6px', width: '100%',
      fontFamily: 'inherit', fontSize: 'inherit', fontWeight: 'inherit',
      resize: multiline ? 'vertical' : 'none', color: 'var(--ink)',
    }}
  />
}

function WeightSlider({ value, original, onChange, hue, ghostMark, height = 22, thumbSize = 14 }) {
  const trackRef = useRef(null)
  const [dragging, setDragging] = useState(false)
  const color = hue != null ? `oklch(0.58 0.16 ${hue})` : 'var(--ink)'
  const move = useCallback(cx => {
    if (!trackRef.current) return
    const r = trackRef.current.getBoundingClientRect()
    const t = Math.max(0, Math.min(1, (cx - r.left) / r.width))
    onChange(Math.round(t * 20) / 2)
  }, [onChange])
  useEffect(() => {
    if (!dragging) return
    const m = e => move(e.clientX)
    const u = () => setDragging(false)
    window.addEventListener('pointermove', m)
    window.addEventListener('pointerup', u)
    return () => { window.removeEventListener('pointermove', m); window.removeEventListener('pointerup', u) }
  }, [dragging, move])
  const showGhost = ghostMark && original != null && Math.abs(original - value) > 0.01
  return (
    <div ref={trackRef}
      onPointerDown={e => { setDragging(true); move(e.clientX) }}
      style={{ position: 'relative', height, cursor: 'pointer', touchAction: 'none', userSelect: 'none' }}>
      <div style={{ position: 'absolute', top: '50%', left: 0, right: 0, height: 3, marginTop: -1.5, background: 'var(--bg-inset)', border: '1px solid var(--rule)', borderRadius: 2 }} />
      <div style={{ position: 'absolute', top: '50%', left: 0, marginTop: -1.5, width: `${(value / 10) * 100}%`, height: 3, background: color, borderRadius: 2, transition: dragging ? 'none' : 'width 180ms' }} />
      {showGhost && <div style={{ position: 'absolute', top: 4, left: `calc(${(original / 10) * 100}% - 1px)`, width: 2, height: height - 8, background: 'var(--ink-faint)', opacity: 0.5 }} />}
      <div style={{ position: 'absolute', top: `calc(50% - ${thumbSize / 2}px)`, left: `calc(${(value / 10) * 100}% - ${thumbSize / 2}px)`, width: thumbSize, height: thumbSize, background: color, borderRadius: 4, boxShadow: dragging ? `0 0 0 4px color-mix(in oklch, ${color} 25%, transparent)` : 'none', transition: dragging ? 'none' : 'left 180ms' }} />
    </div>
  )
}

function ScoreInput({ value, onChange, autoFocus }) {
  const [draft, setDraft] = useState(value != null ? String(value) : '')
  useEffect(() => setDraft(value != null ? String(value) : ''), [value])
  const commit = () => {
    if (draft === '') { if (value != null) onChange(null); return }
    const n = parseFloat(draft)
    if (!isNaN(n)) onChange(Math.max(0, Math.min(10, n)))
    else setDraft(value != null ? String(value) : '')
  }
  return (
    <input type="text" inputMode="decimal" value={draft} autoFocus={autoFocus}
      onChange={e => setDraft(e.target.value.replace(/[^0-9.]/g, ''))}
      onBlur={commit}
      onKeyDown={e => { if (e.key === 'Enter') e.target.blur(); if (e.key === 'Escape') { setDraft(value != null ? String(value) : ''); e.target.blur() }}}
      placeholder="—"
      style={{ width: '100%', padding: '4px 6px', fontFamily: 'Geist Mono, ui-monospace, monospace', fontSize: 13, border: '1px solid var(--rule)', borderRadius: 4, color: 'var(--ink)', fontVariantNumeric: 'tabular-nums', textAlign: 'right' }}
    />
  )
}

function RawInput({ value, onChange, unit, type, options }) {
  const [draft, setDraft] = useState(value ?? '')
  useEffect(() => setDraft(value ?? ''), [value])
  if (type === 'categorical' && options?.length) {
    return (
      <select value={value ?? ''} onChange={e => onChange(e.target.value || null)}
        style={{ width: '100%', padding: '4px 6px', fontSize: 12, border: '1px solid var(--rule)', borderRadius: 4, background: 'var(--bg)', appearance: 'none', color: 'var(--ink)' }}>
        <option value="">—</option>
        {options.map(o => <option key={o} value={o}>{o}</option>)}
      </select>
    )
  }
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
      <input type="text" value={draft} onChange={e => setDraft(e.target.value)}
        onBlur={() => draft !== value && onChange(draft || null)}
        onKeyDown={e => { if (e.key === 'Enter') e.target.blur() }}
        placeholder="raw evidence"
        style={{ width: '100%', padding: '4px 6px', fontFamily: 'Geist Mono, ui-monospace, monospace', fontSize: 11, border: '1px solid var(--rule)', borderRadius: 4, color: 'var(--ink-soft)' }}
      />
      {unit && <span className="label" style={{ flexShrink: 0 }}>{unit}</span>}
    </div>
  )
}

// =============================================================================
// HOME
// =============================================================================
function Home({ decisions, onOpen, onNew, loading }) {
  const open = decisions.filter(d => d.status !== 'closed' && d.status !== 'archived')
  const closed = decisions.filter(d => d.status === 'closed')
  return (
    <div>
      <main style={{ maxWidth: 1200, margin: '0 auto', padding: '40px 28px 64px' }}>
        <div style={{ marginBottom: 36 }}>
          <span className="label">{open.length} open · {closed.length} closed · {new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}</span>
          <h1 style={{ fontSize: 'clamp(32px, 4.5vw, 52px)', fontWeight: 500, letterSpacing: '-0.02em', margin: '12px 0 0', lineHeight: 1.05, maxWidth: 760 }}>
            {open.length === 0 ? 'No questions on your desk.' : `${open.length} ${open.length === 1 ? 'question' : 'questions'} on your desk.`}{' '}
            <span style={{ color: 'var(--ink-faint)' }}>{open.length === 0 ? 'Open a new one when something is weighing on you.' : 'Make one of them a little less heavy today.'}</span>
          </h1>
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 8 }}>
          <span className="label">open</span>
          <button className="btn btn-primary" onClick={onNew}>
            <span style={{ fontSize: 15, lineHeight: 1 }}>+</span> New decision
          </button>
        </div>
        <div style={{ border: '1px solid var(--rule)', borderRadius: 8, overflow: 'hidden', background: 'var(--bg)' }}>
          <div style={{ display: 'grid', gridTemplateColumns: '36px 2.6fr 1.7fr 1.4fr 70px', gap: 16, padding: '11px 18px', background: 'var(--bg-soft)', borderBottom: '1px solid var(--rule)' }}>
            <span className="label">#</span><span className="label">question</span><span className="label">leading</span><span className="label">progress</span><span className="label" style={{ textAlign: 'right' }}>age</span>
          </div>
          {loading ? (
            <div style={{ padding: 48, textAlign: 'center' }}><span className="label">loading…</span></div>
          ) : open.length === 0 ? (
            <div style={{ padding: 48, textAlign: 'center' }}><span className="label">no open decisions yet</span></div>
          ) : (
            open.map((d, i) => <HomeRow key={d.id} d={d} idx={i + 1} onClick={() => onOpen(d.id)} />)
          )}
        </div>
        {closed.length > 0 && (
          <div style={{ marginTop: 40 }}>
            <span className="label">recently closed</span>
            <div style={{ marginTop: 12, border: '1px solid var(--rule)', borderRadius: 8, overflow: 'hidden', background: 'var(--bg-soft)' }}>
              {closed.map(d => (
                <div key={d.id} onClick={() => onOpen(d.id)} style={{ display: 'grid', gridTemplateColumns: '36px 2.6fr 1.7fr 1.4fr 70px', gap: 16, alignItems: 'center', padding: '14px 18px', opacity: 0.75, borderBottom: '1px solid var(--rule-soft)', cursor: 'pointer' }}>
                  <span className="mono" style={{ fontSize: 11, color: 'var(--ink-faint)' }}>—</span>
                  <div>
                    <div style={{ fontSize: 14, fontWeight: 500 }}>{d.title || <em style={{ color: 'var(--ink-faint)' }}>untitled</em>}</div>
                    <span className="label" style={{ marginTop: 3, display: 'block' }}>{d.type || 'custom'} · closed</span>
                  </div>
                  <span className="label">picked</span>
                  <span className="label">complete</span>
                  <span />
                </div>
              ))}
            </div>
          </div>
        )}
      </main>
    </div>
  )
}

function HomeRow({ d, idx, onClick }) {
  const [hover, setHover] = useState(false)
  const ranked = rankedOptions(d._options, d._scores, d._parameters)
  const leading = ranked[0] && ranked[0]._total != null ? ranked[0] : null
  const runner  = ranked[1] && ranked[1]._total != null ? ranked[1] : null
  const gap = leading && runner ? leading._total - runner._total : null
  const c = completeness(d._parameters, d._options, d._scores)
  const daysOpen = Math.max(1, Math.floor((Date.now() - new Date(d.created_at).getTime()) / 86400000))
  const statusLabel = c.pct >= 0.7 ? 'ready to choose' : c.pct >= 0.35 ? 'still gathering' : 'just started'
  return (
    <div onClick={onClick} onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{ display: 'grid', gridTemplateColumns: '36px 2.6fr 1.7fr 1.4fr 70px', gap: 16, alignItems: 'center', padding: '18px 18px', borderBottom: '1px solid var(--rule-soft)', cursor: 'pointer', background: hover ? 'var(--bg-soft)' : 'transparent', transition: 'background 120ms' }}>
      <span className="mono" style={{ fontSize: 12, color: 'var(--ink-faint)' }}>{String(idx).padStart(2, '0')}</span>
      <div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap' }}>
          <span style={{ fontSize: 15, fontWeight: 500 }}>{d.title?.trim() || <em style={{ color: 'var(--ink-faint)' }}>untitled question</em>}</span>
          {gap != null && gap < 0.6 && <Pill color="var(--neg)">tight</Pill>}
          {c.pct === 0 && <Pill color="var(--ink-faint)">empty</Pill>}
        </div>
        <span className="label" style={{ marginTop: 4, display: 'block' }}>{d.type || 'custom'} · {d._parameters.length}p × {d._options.length}o</span>
      </div>
      {leading ? (
        <div>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, flexWrap: 'wrap' }}>
            <span style={{ fontSize: 14, fontWeight: 500 }}>{leading.name || 'unnamed'}</span>
            <span className="mono" style={{ fontSize: 13, color: 'var(--accent)' }}>{leading._total.toFixed(2)}</span>
          </div>
          {gap != null && <span className="label" style={{ marginTop: 4, display: 'block' }}>+{gap.toFixed(2)} ahead</span>}
        </div>
      ) : (<span className="label">no scores yet</span>)}
      <div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{ flex: 1, height: 4, background: 'var(--rule-soft)', borderRadius: 2, overflow: 'hidden' }}>
            <div style={{ width: `${c.pct * 100}%`, height: '100%', background: c.pct >= 0.7 ? 'var(--accent)' : 'var(--ink)', transition: 'width 300ms' }} />
          </div>
          <span className="mono" style={{ fontSize: 11, color: 'var(--ink-soft)', minWidth: 32, textAlign: 'right' }}>{Math.round(c.pct * 100)}%</span>
        </div>
        <span className="label" style={{ marginTop: 6, display: 'block' }}>{statusLabel}</span>
      </div>
      <span className="mono" style={{ fontSize: 11, color: 'var(--ink-faint)', textAlign: 'right' }}>{daysOpen}d</span>
    </div>
  )
}

// =============================================================================
// DECISION VIEW
// =============================================================================
function DecisionView({ decision, data, onBack, onTitleUpdate, paramHandlers, optionHandlers, onScoreUpdate, onOpenMode }) {
  const [overrides, setOverrides] = useState(null)
  const [highlight, setHighlight] = useState(null)

  const ranked = useMemo(() => rankedOptions(data.options, data.scores, data.parameters, overrides), [data, overrides])
  const baseline = useMemo(() => rankedOptions(data.options, data.scores, data.parameters), [data])
  const top = ranked[0]; const runner = ranked[1]
  const gap = top && runner && top._total != null && runner._total != null ? top._total - runner._total : null
  const c = completeness(data.parameters, data.options, data.scores)
  const robust = useMemo(() => robustness(data.parameters, data.options, data.scores), [data])
  const isWhatIf = overrides != null

  const paramHues = [145, 30, 260, 75, 320, 200, 60, 290, 175, 240]
  const paramColors = {}
  data.parameters.forEach((pp, i) => { paramColors[pp.id] = `oklch(0.62 0.13 ${paramHues[i % paramHues.length]})` })

  const maxContrib = Math.max(1, ...data.options.map(o =>
    data.parameters.reduce((s, p) => s + paramContribution(o.id, p.id, data.scores, data.parameters, overrides), 0)
  ))

  return (
    <div>
      {/* WEIGHT STRIP */}
      <div style={{ background: isWhatIf ? 'var(--hi-soft)' : 'var(--bg-inset)', borderBottom: `1px solid ${isWhatIf ? 'var(--hi)' : 'var(--rule)'}`, padding: '14px 28px', transition: 'background 200ms' }}>
        <div style={{ maxWidth: 1280, margin: '0 auto', display: 'grid', gridTemplateColumns: 'auto 1fr auto', gap: 18, alignItems: 'center' }}>
          <div style={{ minWidth: 90 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span className="label" style={isWhatIf ? { color: 'var(--hi)' } : undefined}>weights</span>
              {isWhatIf && <Pill color="var(--hi)">what-if</Pill>}
            </div>
            <div style={{ marginTop: 3, fontSize: 11, color: 'var(--ink-soft)' }}>{isWhatIf ? 'temporary' : 'drag to rebalance'}</div>
          </div>
          {data.parameters.length === 0 ? (
            <span className="label" style={{ paddingLeft: 12 }}>add a parameter to start weighting</span>
          ) : (
            <div style={{ display: 'grid', gridTemplateColumns: `repeat(${data.parameters.length}, minmax(0, 1fr))`, gap: 14 }}>
              {data.parameters.map(pp => {
                const cur = overrides?.[pp.id] ?? Number(pp.weight)
                const over = overrides?.[pp.id] != null && Math.abs(overrides[pp.id] - Number(pp.weight)) > 0.01
                return (
                  <div key={pp.id} onMouseEnter={() => setHighlight(pp.id)} onMouseLeave={() => setHighlight(null)}
                    style={{ padding: '6px 8px 8px', borderRadius: 5, background: highlight === pp.id ? 'var(--bg)' : 'transparent', transition: 'background 150ms' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 2 }}>
                      <span style={{ fontSize: 11, fontWeight: 500, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{pp.name}</span>
                      <span className="mono" style={{ fontSize: 11, color: over ? 'var(--hi)' : 'var(--ink-soft)' }}>{cur.toFixed(0)}</span>
                    </div>
                    <WeightSlider value={cur} original={Number(pp.weight)} ghostMark={isWhatIf} hue={over ? 260 : 240}
                      onChange={v => {
                        if (isWhatIf) setOverrides(prev => ({ ...prev, [pp.id]: v }))
                        else if (Math.abs(v - Number(pp.weight)) > 0.01) setOverrides({ [pp.id]: v })
                      }}
                    />
                    <div style={{ marginTop: 4, height: 2, borderRadius: 1, background: paramColors[pp.id], opacity: 0.6 }} />
                  </div>
                )
              })}
            </div>
          )}
          <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
            {isWhatIf && <button className="btn btn-outline btn-sm" onClick={() => setOverrides(null)}>Reset</button>}
            {isWhatIf && <button className="btn btn-primary btn-sm" onClick={async () => {
              for (const [pid, w] of Object.entries(overrides)) await paramHandlers.onUpdate(pid, { weight: w })
              setOverrides(null)
            }}>Save as weights</button>}
          </div>
        </div>
      </div>

      <main style={{ maxWidth: 1280, margin: '0 auto', padding: '28px 28px 80px' }}>
        {/* title + actions */}
        <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 24, flexWrap: 'wrap', marginBottom: 24 }}>
          <div style={{ flex: '1 1 320px' }}>
            <button className="btn btn-ghost btn-sm" onClick={onBack} style={{ marginLeft: -10, marginBottom: 4 }}>← all decisions</button>
            <h1 style={{ margin: 0, fontSize: 'clamp(24px, 3vw, 38px)', fontWeight: 500, letterSpacing: '-0.02em' }}>
              <InlineText value={decision.title} onCommit={onTitleUpdate} placeholder="What are you deciding?" />
            </h1>
            <div style={{ marginTop: 6 }}><span className="label">started {new Date(decision.created_at).toLocaleDateString()}</span></div>
          </div>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            <button className="btn btn-outline btn-sm" onClick={() => onOpenMode('blind')}>Blind score mode</button>
            <button className="btn btn-outline btn-sm" onClick={() => onOpenMode('whatif')}>What-if</button>
          </div>
        </div>

        {/* STANDINGS */}
        <section style={{ marginBottom: 32 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 14, gap: 12, flexWrap: 'wrap' }}>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 12, flexWrap: 'wrap' }}>
              <span className="label">standings · weighted total</span>
              {gap != null && gap < 0.6 && <Pill color="var(--neg)">tight · only {gap.toFixed(2)} ahead</Pill>}
              {robust != null && (
                <Pill color={robust >= 0.7 ? 'var(--accent)' : robust >= 0.4 ? 'var(--warn)' : 'var(--neg)'}>
                  robustness {robust.toFixed(2)}
                </Pill>
              )}
            </div>
            <span className="label">contribution stacks by parameter · {c.filled}/{c.total} considered</span>
          </div>

          {data.options.length === 0 && data.parameters.length === 0 ? (
            <EmptyState onAddParam={paramHandlers.onAdd} onAddOption={optionHandlers.onAdd} />
          ) : (
            <div style={{ border: '1px solid var(--rule)', background: 'var(--bg)', borderRadius: 8, overflow: 'hidden' }}>
              {ranked.map((o, i) => (
                <LeaderRow key={o.id} option={o} rank={i} parameters={data.parameters} scores={data.scores}
                  paramColors={paramColors} maxContrib={maxContrib} overrides={overrides}
                  highlight={highlight} onHighlight={setHighlight}
                  baselineRank={baseline.findIndex(x => x.id === o.id)} isWhatIf={isWhatIf}
                  onRename={v => optionHandlers.onUpdate(o.id, { name: v })}
                  onDelete={() => optionHandlers.onDelete(o.id)}
                />
              ))}
              <AddOptionRow onAdd={optionHandlers.onAdd} />
              <Legend parameters={data.parameters} paramColors={paramColors} highlight={highlight} onHighlight={setHighlight} overrides={overrides} />
            </div>
          )}
        </section>

        {/* MATRIX */}
        {(data.parameters.length > 0 || data.options.length > 0) && (
          <section>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 14 }}>
              <span className="label">matrix · click a cell to edit</span>
              <span className="label">{c.total - c.filled} empty</span>
            </div>
            <div style={{ border: '1px solid var(--rule)', borderRadius: 8, background: 'var(--bg)', overflow: 'auto' }}>
              <Matrix parameters={data.parameters} options={data.options} scores={data.scores}
                paramColors={paramColors} highlight={highlight} setHighlight={setHighlight}
                onScoreUpdate={onScoreUpdate} paramHandlers={paramHandlers} optionHandlers={optionHandlers}
              />
            </div>
          </section>
        )}
      </main>
    </div>
  )
}

// ── empty state ───
function EmptyState({ onAddParam, onAddOption }) {
  const [pDraft, setPDraft] = useState('')
  const [oDraft, setODraft] = useState('')
  return (
    <div style={{ border: '1px dashed var(--rule)', borderRadius: 8, padding: 32, background: 'var(--bg-soft)' }}>
      <p style={{ fontSize: 14, color: 'var(--ink-soft)', marginTop: 0, marginBottom: 16 }}>
        Empty matrix. Add <strong>parameters</strong> (what matters to you) and <strong>options</strong> (what you're comparing).
      </p>
      <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
        <input value={pDraft} onChange={e => setPDraft(e.target.value)} placeholder="+ first parameter…"
          onKeyDown={e => { if (e.key === 'Enter' && pDraft.trim()) { onAddParam(pDraft.trim()); setPDraft('') }}}
          style={{ padding: '8px 12px', border: '1px solid var(--rule)', borderRadius: 6, fontSize: 13, minWidth: 200, color: 'var(--ink)' }} />
        <input value={oDraft} onChange={e => setODraft(e.target.value)} placeholder="+ first option…"
          onKeyDown={e => { if (e.key === 'Enter' && oDraft.trim()) { onAddOption(oDraft.trim()); setODraft('') }}}
          style={{ padding: '8px 12px', border: '1px solid var(--rule)', borderRadius: 6, fontSize: 13, minWidth: 200, color: 'var(--ink)' }} />
      </div>
    </div>
  )
}

function LeaderRow({ option, rank, parameters, scores, paramColors, maxContrib, overrides, highlight, onHighlight, baselineRank, isWhatIf, onRename, onDelete }) {
  const [hover, setHover] = useState(false)
  const isTop = rank === 0
  const shift = baselineRank - rank
  const parts = parameters.map(p => ({ p, contrib: paramContribution(option.id, p.id, scores, parameters, overrides) }))
  const total = parts.reduce((s, x) => s + x.contrib, 0)
  return (
    <div onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{ display: 'grid', gridTemplateColumns: '40px 1fr 100px 36px', gap: 16, alignItems: 'center', padding: '18px 22px', borderBottom: '1px solid var(--rule-soft)',
        background: isTop ? (isWhatIf ? 'var(--hi-soft)' : 'var(--accent-soft)') : (hover ? 'var(--bg-soft)' : 'transparent'), transition: 'background 150ms' }}>
      <span className="mono" style={{ fontSize: 22, fontWeight: 600, color: isTop ? (isWhatIf ? 'var(--hi)' : 'var(--accent)') : 'var(--ink-faint)' }}>{String(rank + 1).padStart(2, '0')}</span>
      <div style={{ minWidth: 0 }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, marginBottom: 8, flexWrap: 'wrap' }}>
          <span style={{ fontSize: 16, fontWeight: 500 }}>
            <InlineText value={option.name} onCommit={onRename} placeholder="option" style={{ fontSize: 16, fontWeight: 500 }} />
          </span>
          {isTop && <Pill color={isWhatIf ? 'var(--hi)' : 'var(--accent)'}>leading</Pill>}
          {shift > 0 && <Pill color="var(--accent)">↑{shift}</Pill>}
          {shift < 0 && <Pill color="var(--neg)">↓{Math.abs(shift)}</Pill>}
        </div>
        <div style={{ height: isTop ? 14 : 10, width: `${Math.max(6, (total / maxContrib) * 100)}%`, display: 'flex', borderRadius: 3, overflow: 'hidden', minWidth: 16, transition: 'width 320ms ease-out', boxShadow: '0 0 0 1px var(--rule-soft)' }}>
          {parts.map(({ p, contrib }) => contrib > 0 && (
            <div key={p.id} title={`${p.name}: ${contrib.toFixed(1)}`}
              onMouseEnter={() => onHighlight(p.id)} onMouseLeave={() => onHighlight(null)}
              style={{ width: `${(contrib / total) * 100}%`, height: '100%', background: paramColors[p.id],
                opacity: highlight == null || highlight === p.id ? 1 : 0.18,
                transition: 'opacity 150ms, width 320ms ease-out' }} />
          ))}
        </div>
      </div>
      <div style={{ textAlign: 'right' }}>
        <span className="mono" style={{ fontSize: 26, fontWeight: 500, color: isTop ? (isWhatIf ? 'var(--hi)' : 'var(--accent)') : 'var(--ink)' }}>
          {option._total != null ? option._total.toFixed(2) : '—'}
        </span>
        <div style={{ marginTop: 2 }}><span className="label">of 10</span></div>
      </div>
      <div style={{ display: 'flex', justifyContent: 'flex-end' }}>
        {hover && <button className="iconbtn" onClick={onDelete} title="remove option">×</button>}
      </div>
    </div>
  )
}

function Legend({ parameters, paramColors, highlight, onHighlight, overrides }) {
  return (
    <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap', padding: '12px 22px', borderTop: '1px solid var(--rule-soft)', background: 'var(--bg-soft)' }}>
      {parameters.map(pp => {
        const cur = overrides?.[pp.id] ?? Number(pp.weight)
        return (
          <button key={pp.id} onMouseEnter={() => onHighlight(pp.id)} onMouseLeave={() => onHighlight(null)}
            style={{ display: 'flex', alignItems: 'center', gap: 6, background: 'transparent', border: 'none', padding: 0,
              opacity: highlight == null || highlight === pp.id ? 1 : 0.35, transition: 'opacity 150ms' }}>
            <span style={{ width: 10, height: 10, borderRadius: 2, background: paramColors[pp.id] }} />
            <span style={{ fontSize: 11, color: 'var(--ink-soft)' }}>{pp.name}</span>
            <span className="mono" style={{ fontSize: 10, color: 'var(--ink-faint)' }}>w{cur.toFixed(0)}</span>
          </button>
        )
      })}
    </div>
  )
}

function AddOptionRow({ onAdd }) {
  const [draft, setDraft] = useState('')
  const commit = () => { if (draft.trim()) { onAdd(draft.trim()); setDraft('') } }
  return (
    <div style={{ display: 'grid', gridTemplateColumns: '40px 1fr 100px 36px', gap: 16, alignItems: 'center', padding: '14px 22px', borderBottom: '1px solid var(--rule-soft)', background: 'var(--bg-soft)' }}>
      <span className="label">+</span>
      <input value={draft} onChange={e => setDraft(e.target.value)}
        onKeyDown={e => { if (e.key === 'Enter') commit() }} onBlur={commit}
        placeholder="add an option to compare…"
        style={{ border: 'none', padding: 0, fontSize: 14, color: 'var(--ink)', width: '100%' }} />
      <span className="label">enter</span><span />
    </div>
  )
}

// =============================================================================
// MATRIX
// =============================================================================
function Matrix({ parameters, options, scores, paramColors, highlight, setHighlight, onScoreUpdate, paramHandlers, optionHandlers }) {
  const [addParamDraft, setAddParamDraft] = useState('')
  return (
    <table style={{ borderCollapse: 'collapse', width: '100%', minWidth: 720 }}>
      <thead>
        <tr style={{ background: 'var(--bg-soft)', borderBottom: '1px solid var(--rule)' }}>
          <th style={{ padding: '12px 18px', textAlign: 'left', minWidth: 200, position: 'sticky', left: 0, background: 'var(--bg-soft)', zIndex: 2 }}><span className="label">consideration</span></th>
          <th style={{ padding: '12px 12px', textAlign: 'left', width: 60 }}><span className="label">w</span></th>
          {options.map(o => (
            <th key={o.id} style={{ padding: '12px 12px', textAlign: 'left', minWidth: 160 }}>
              <div style={{ fontSize: 13, fontWeight: 500 }}>
                <InlineText value={o.name} onCommit={v => optionHandlers.onUpdate(o.id, { name: v })} placeholder="option" style={{ fontSize: 13, fontWeight: 500 }} />
              </div>
            </th>
          ))}
        </tr>
      </thead>
      <tbody>
        {parameters.map(pp => {
          const isHi = highlight === pp.id
          return (
            <tr key={pp.id} onMouseEnter={() => setHighlight(pp.id)} onMouseLeave={() => setHighlight(null)}
              style={{ borderTop: '1px solid var(--rule-soft)', background: isHi ? 'var(--bg-soft)' : 'transparent', transition: 'background 150ms' }}>
              <td style={{ padding: '12px 18px', position: 'sticky', left: 0, background: isHi ? 'var(--bg-soft)' : 'var(--bg)', zIndex: 1 }}>
                <ParameterRow parameter={pp} color={paramColors[pp.id]} onUpdate={fields => paramHandlers.onUpdate(pp.id, fields)} onDelete={() => paramHandlers.onDelete(pp.id)} />
              </td>
              <td style={{ padding: '12px 12px' }}>
                <input type="number" min="0" max="10" step="0.5" value={pp.weight}
                  onChange={e => paramHandlers.onUpdate(pp.id, { weight: parseFloat(e.target.value) || 0 })}
                  style={{ width: 48, fontFamily: 'Geist Mono, monospace', fontSize: 13, border: '1px solid var(--rule)', borderRadius: 4, padding: '3px 6px', color: 'var(--ink)' }} />
              </td>
              {options.map(o => (
                <Cell key={o.id} param={pp} option={o}
                  score={scores.find(s => s.option_id === o.id && s.parameter_id === pp.id)}
                  onUpdate={fields => onScoreUpdate(o.id, pp.id, fields)}
                  allOptions={options} allScores={scores} parameters={parameters} />
              ))}
            </tr>
          )
        })}
        <tr style={{ borderTop: '1px solid var(--rule-soft)' }}>
          <td colSpan={2 + options.length} style={{ padding: '12px 18px', background: 'var(--bg-soft)' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <span className="label">+</span>
              <input value={addParamDraft} onChange={e => setAddParamDraft(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter' && addParamDraft.trim()) { paramHandlers.onAdd(addParamDraft.trim()); setAddParamDraft('') }}}
                placeholder="add a consideration…"
                style={{ border: 'none', padding: 0, fontSize: 14, color: 'var(--ink)', flex: 1 }} />
              <span className="label">enter</span>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  )
}

function ParameterRow({ parameter, color, onUpdate, onDelete }) {
  const [showType, setShowType] = useState(false)
  const options = Array.isArray(parameter.options) ? parameter.options : []
  return (
    <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10 }}>
      <span style={{ width: 4, height: 20, background: color, borderRadius: 1, flexShrink: 0, marginTop: 2 }} />
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 13, fontWeight: 500 }}>
          <InlineText value={parameter.name} onCommit={v => onUpdate({ name: v })} placeholder="parameter" style={{ fontSize: 13, fontWeight: 500 }} />
        </div>
        <button onClick={() => setShowType(s => !s)} className="label" style={{ background: 'none', border: 'none', padding: '2px 0', display: 'inline-flex', alignItems: 'center', gap: 4 }}>
          <span style={{ opacity: 0.6 }}>{showType ? '▾' : '▸'}</span>
          {parameter.input_type || 'text'}{parameter.unit ? ` · ${parameter.unit}` : ''}{parameter.input_type === 'categorical' ? ` · ${options.length} opts` : ''}
        </button>
        {showType && (
          <div style={{ marginTop: 8, padding: 10, background: 'var(--bg-inset)', borderRadius: 4 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 6 }}>
              <span className="label" style={{ fontSize: 9 }}>type</span>
              <select value={parameter.input_type || 'text'} onChange={e => {
                const t = e.target.value
                const u = { input_type: t }
                if (t !== 'number') u.unit = null
                if (t === 'categorical' && options.length === 0) u.options = ['', '']
                if (t !== 'categorical') u.options = null
                onUpdate(u)
              }} style={{ fontSize: 11, border: '1px solid var(--rule)', borderRadius: 3, padding: '2px 4px', background: 'var(--bg)', color: 'var(--ink)' }}>
                <option value="text">text</option>
                <option value="number">number</option>
                <option value="categorical">categorical</option>
              </select>
            </div>
            {parameter.input_type === 'number' && (
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 6 }}>
                <span className="label" style={{ fontSize: 9 }}>unit</span>
                <input value={parameter.unit || ''} onChange={e => onUpdate({ unit: e.target.value })}
                  placeholder="e.g. 万円, %, h"
                  style={{ fontSize: 11, border: '1px solid var(--rule)', borderRadius: 3, padding: '2px 4px', color: 'var(--ink)' }} />
              </div>
            )}
            {parameter.input_type === 'categorical' && (
              <div>
                <div className="label" style={{ fontSize: 9, marginBottom: 4 }}>options</div>
                {options.map((opt, i) => (
                  <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 4, marginBottom: 3 }}>
                    <input value={opt} onChange={e => { const n = [...options]; n[i] = e.target.value; onUpdate({ options: n }) }}
                      style={{ flex: 1, fontSize: 11, border: '1px solid var(--rule)', borderRadius: 3, padding: '2px 4px', color: 'var(--ink)' }} />
                    <button onClick={() => onUpdate({ options: options.filter((_, j) => j !== i) })} className="iconbtn" style={{ width: 20, height: 20, fontSize: 11 }}>×</button>
                  </div>
                ))}
                <button className="label" onClick={() => onUpdate({ options: [...options, ''] })} style={{ background: 'none', border: 'none', padding: 0 }}>+ add option</button>
              </div>
            )}
            <button className="iconbtn" onClick={onDelete} title="delete parameter" style={{ color: 'var(--neg)', marginTop: 6 }}>delete row</button>
          </div>
        )}
      </div>
    </div>
  )
}

// Score slider — drag 0–10 with visible value. Variant of WeightSlider sized
// to fit inside a matrix cell.
function ScoreSlider({ value, onChange }) {
  const trackRef = useRef(null)
  const [dragging, setDragging] = useState(false)
  const v = value ?? null
  const move = useCallback(cx => {
    if (!trackRef.current) return
    const r = trackRef.current.getBoundingClientRect()
    const t = Math.max(0, Math.min(1, (cx - r.left) / r.width))
    onChange(Math.round(t * 20) / 2)
  }, [onChange])
  useEffect(() => {
    if (!dragging) return
    const m = e => move(e.clientX)
    const u = () => setDragging(false)
    window.addEventListener('pointermove', m)
    window.addEventListener('pointerup', u)
    return () => { window.removeEventListener('pointermove', m); window.removeEventListener('pointerup', u) }
  }, [dragging, move])
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
      <div ref={trackRef}
        onPointerDown={e => { setDragging(true); move(e.clientX) }}
        style={{ position: 'relative', flex: 1, height: 22, cursor: 'pointer', touchAction: 'none', userSelect: 'none' }}>
        {/* track */}
        <div style={{ position: 'absolute', top: 10, left: 0, right: 0, height: 2, background: 'var(--rule)', borderRadius: 1 }} />
        {/* fill (0 if unset) */}
        {v != null && (
          <div style={{ position: 'absolute', top: 10, left: 0, height: 2, width: `${(v / 10) * 100}%`, background: 'var(--accent)', borderRadius: 1, transition: dragging ? 'none' : 'width 180ms' }} />
        )}
        {/* tick marks at 0, 5, 10 */}
        {[0, 5, 10].map(t => (
          <div key={t} style={{ position: 'absolute', top: 7, left: `${(t / 10) * 100}%`, width: 1, height: 8, background: 'var(--ink-ghost)' }} />
        ))}
        {/* thumb */}
        {v != null ? (
          <div style={{ position: 'absolute', top: 4, left: `calc(${(v / 10) * 100}% - 7px)`, width: 14, height: 14, background: 'var(--accent)', border: '2px solid var(--bg)', borderRadius: '50%', boxShadow: dragging ? '0 0 0 4px color-mix(in oklch, var(--accent) 25%, transparent)' : '0 0 0 1px var(--accent)', transition: dragging ? 'none' : 'left 180ms' }} />
        ) : (
          // empty thumb hint at the start
          <div style={{ position: 'absolute', top: 4, left: -7, width: 14, height: 14, background: 'transparent', border: '2px dashed var(--ink-ghost)', borderRadius: '50%' }} />
        )}
      </div>
      <span className="mono" style={{ fontSize: 12, color: v != null ? 'var(--accent)' : 'var(--ink-faint)', minWidth: 26, textAlign: 'right', fontWeight: 500 }}>
        {v != null ? v.toFixed(1) : '—'}
      </span>
      {v != null && (
        <button onClick={() => onChange(null)} title="clear"
          style={{ background: 'transparent', border: 'none', color: 'var(--ink-ghost)', padding: 0, width: 14, height: 14, fontSize: 11, lineHeight: 1 }}>×</button>
      )}
    </div>
  )
}

// AI cross-check — asks Claude to challenge the user's rating given the
// parameter, option, raw evidence, and current score. Inline popover.
//
// Calls one of two endpoints, whichever responds:
//   1. window.claude.complete — present in claude.ai artifacts (dev/preview)
//   2. <SUPABASE_URL>/functions/v1/cross-check — production
//      (deploy supabase/functions/cross-check/index.ts; see README at bottom)
async function askClaude(prompt) {
  // 1. artifact helper (dev only)
  if (typeof window !== 'undefined' && window.claude?.complete) {
    return await window.claude.complete(prompt)
  }
  // 2. production: call your Supabase Edge Function
  const url = `${SUPABASE_URL}/functions/v1/cross-check`
  const res = await fetch(url, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
    },
    body: JSON.stringify({ prompt }),
  })
  if (!res.ok) throw new Error(`cross-check ${res.status}: ${await res.text()}`)
  const data = await res.json()
  return data.text || data.content || ''
}

function CrossCheck({ param, option, score, allOptions, allScores, parameters }) {
  const [open, setOpen] = useState(false)
  const [loading, setLoading] = useState(false)
  const [response, setResponse] = useState('')
  const [error, setError] = useState(null)

  const ask = async () => {
    setLoading(true); setError(null); setResponse('')
    try {
      // build context: this score, plus how this option compares to others on this param
      const peers = allOptions
        .filter(o => o.id !== option.id)
        .map(o => {
          const s = allScores.find(x => x.option_id === o.id && x.parameter_id === param.id)
          return { name: o.name, value: s?.value, raw: s?.notes }
        })
        .filter(x => x.value != null || x.raw)

      const prompt = `You are a thoughtful decision-coach helping the user stress-test their own ratings on a weighted-decision tool. Your goal is to push back when you see possible bias — anchoring, halo effect, recency, motivated reasoning — not to be agreeable.

Decision context:
- Consideration: "${param.name}" (type: ${param.input_type || 'text'}${param.unit ? `, unit: ${param.unit}` : ''})
- Option being scored: "${option.name}"
- Raw evidence the user wrote: ${score?.notes ? `"${score.notes}${param.unit ? ' ' + param.unit : ''}"` : '(none)'}
- User's score: ${score?.value != null ? `${score.value} / 10` : '(unset)'}

How the user scored peer options on this same consideration:
${peers.length === 0 ? '(no peers scored yet)' : peers.map(p => `- "${p.name}": ${p.value != null ? p.value.toFixed(1) + '/10' : '—'}${p.raw ? `  (raw: "${p.raw}")` : ''}`).join('\n')}

Respond in 3-5 short bullet points, conversational, second person. Focus on:
1. Whether the score is internally consistent with the raw evidence.
2. Whether the score is consistent with peer scores (e.g. if peer has worse raw but higher score, flag it).
3. One concrete bias risk to consider.
4. Suggest a tighter score range if you'd nudge it.

Be direct, not soft. No preamble, no recap, no "great question". Use plain text, no markdown headers.`

      const text = await askClaude(prompt)
      setResponse(text)
    } catch (e) {
      setError(e?.message || String(e))
    } finally {
      setLoading(false)
    }
  }

  return (
    <div style={{ position: 'relative' }}>
      <button onClick={() => { setOpen(o => !o); if (!response && !loading) ask() }}
        disabled={score?.value == null}
        title={score?.value == null ? 'set a score first' : 'cross-check this rating'}
        style={{
          background: 'transparent', border: '1px solid var(--rule)', borderRadius: 4,
          padding: '2px 7px', fontSize: 10, color: 'var(--ink-soft)',
          display: 'inline-flex', alignItems: 'center', gap: 4, fontFamily: 'Geist Mono, monospace',
          letterSpacing: '0.04em', textTransform: 'uppercase',
          opacity: score?.value == null ? 0.3 : 1,
        }}>
        <span style={{ fontSize: 9 }}>◇</span> cross-check
      </button>
      {open && (
        <div style={{
          position: 'absolute', top: 'calc(100% + 6px)', left: 0, zIndex: 20,
          width: 320, padding: '14px 16px',
          background: 'var(--bg)', border: '1px solid var(--hi)', borderRadius: 6,
          boxShadow: '0 14px 30px rgba(0,0,0,0.18)',
        }}
        onClick={e => e.stopPropagation()}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
            <Pill color="var(--hi)">cross-check · {param.name}</Pill>
            <button onClick={() => setOpen(false)} className="iconbtn" style={{ width: 20, height: 20, fontSize: 12 }}>×</button>
          </div>
          {loading && <div style={{ fontSize: 12, color: 'var(--ink-soft)', fontStyle: 'italic' }}>thinking…</div>}
          {error && <div style={{ fontSize: 12, color: 'var(--neg)' }}>{error}</div>}
          {response && (
            <div style={{ fontSize: 12.5, lineHeight: 1.55, color: 'var(--ink)', whiteSpace: 'pre-wrap' }}>{response}</div>
          )}
          {response && (
            <button onClick={() => { setResponse(''); ask() }}
              style={{ marginTop: 10, background: 'transparent', border: '1px solid var(--rule)', borderRadius: 4, padding: '4px 8px', fontSize: 10, color: 'var(--ink-soft)', fontFamily: 'Geist Mono, monospace', letterSpacing: '0.04em', textTransform: 'uppercase' }}>
              ↻ ask again
            </button>
          )}
        </div>
      )}
    </div>
  )
}
// Raw value on top (text / number / categorical, per input_type),
// score number + visual bar below. No click-to-edit step.
function Cell({ param, option, score, onUpdate }) {
  const [scoreDraft, setScoreDraft] = useState(score?.value ?? '')
  useEffect(() => { setScoreDraft(score?.value ?? '') }, [score?.value])

  const commitScore = () => {
    if (scoreDraft === '' || scoreDraft === null) {
      if (score?.value != null) onUpdate({ value: null })
      return
    }
    const num = parseFloat(scoreDraft)
    if (isNaN(num)) { setScoreDraft(score?.value ?? ''); return }
    const clamped = Math.max(0, Math.min(10, num))
    if (clamped !== score?.value) onUpdate({ value: clamped })
  }

  const pct = score?.value != null ? Math.max(0, Math.min(100, (Number(score.value) / 10) * 100)) : 0

  return (
    <td style={{ padding: '10px 12px', minWidth: 160, verticalAlign: 'top' }}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        {/* raw value (typed input) */}
        <RawInput
          value={score?.notes}
          unit={param.unit}
          type={param.input_type}
          options={param.options}
          onChange={v => onUpdate({ notes: v })}
        />

        {/* score number + bar */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <input
            type="number" min="0" max="10" step="0.5"
            value={scoreDraft}
            onChange={e => setScoreDraft(e.target.value)}
            onBlur={commitScore}
            onKeyDown={e => { if (e.key === 'Enter') e.target.blur() }}
            placeholder="—"
            className="mono"
            style={{
              width: 44, fontSize: 13, textAlign: 'right',
              border: '1px solid var(--rule)', borderRadius: 4, padding: '3px 6px',
              color: 'var(--accent)', flexShrink: 0,
            }}
          />
          <div style={{ flex: 1, position: 'relative', height: 1, background: 'var(--rule)' }}>
            {score?.value != null && (
              <div style={{
                position: 'absolute', left: 0, top: 0, height: 1,
                width: `${pct}%`, background: 'var(--accent)',
                transition: 'width 200ms',
              }} />
            )}
          </div>
        </div>
      </div>
    </td>
  )
}

function WhatIfOverlay({ data, onClose }) {
  const baseline = useMemo(() => rankedOptions(data.options, data.scores, data.parameters), [data])
  const baseTop = baseline[0]
  const robust = useMemo(() => robustness(data.parameters, data.options, data.scores), [data])
  const baseSens = useMemo(() => perWeightSensitivity(data.parameters, data.options, data.scores), [data])

  useEffect(() => {
    const k = e => { if (e.key === 'Escape') onClose() }
    window.addEventListener('keydown', k); return () => window.removeEventListener('keydown', k)
  }, [onClose])

  return (
    <div className="overlay-bg" onClick={onClose}>
      <div className="overlay-card" onClick={e => e.stopPropagation()} style={{ width: 1080, maxWidth: '95vw' }}>
        <div style={{ padding: '24px 32px 18px', borderBottom: '1px solid var(--rule)', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', position: 'sticky', top: 0, background: 'var(--bg)', zIndex: 1 }}>
          <div>
            <span className="label">what-if · sensitivity</span>
            <h2 style={{ margin: '6px 0 0', fontSize: 26, fontWeight: 500, letterSpacing: '-0.02em' }}>Is the answer robust to how you weighted things?</h2>
          </div>
          <button className="iconbtn" onClick={onClose}>×</button>
        </div>
        <div style={{ padding: '24px 32px 40px' }}>
          {robust != null && baseTop && (
            <div style={{ padding: '24px 28px', background: 'var(--ink)', color: 'var(--bg)', borderRadius: 8, display: 'grid', gridTemplateColumns: 'auto 1fr', gap: 32, alignItems: 'center', marginBottom: 28 }}>
              <div>
                <span className="label" style={{ color: 'oklch(0.7 0.05 240)' }}>robustness</span>
                <div style={{ fontSize: 56, fontWeight: 500, lineHeight: 1, marginTop: 6 }}>{robust.toFixed(2)}</div>
              </div>
              <div style={{ fontSize: 14, lineHeight: 1.55 }}>
                Across 100 weight perturbations (±2 on each weight), <strong>{baseTop.name}</strong> stays on top{' '}
                <strong style={{ color: 'var(--accent)' }}>{Math.round(robust * 100)}%</strong> of the time.{' '}
                {robust >= 0.7 ? 'The pick is robust.' : robust >= 0.4 ? 'Mixed — sleep on it.' : 'Fragile — different weights would pick differently.'}
              </div>
            </div>
          )}
          <section>
            <span className="label">per-weight sensitivity · how often does sweeping each weight 0→10 flip the leader?</span>
            <div style={{ marginTop: 14, display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(230px, 1fr))', gap: 12 }}>
              {baseSens.map((row, i) => {
                const flag = row.sens > 0.4
                return (
                  <div key={i} style={{ padding: '14px 16px', border: `1px solid ${flag ? 'var(--neg)' : 'var(--rule)'}`, background: flag ? 'var(--neg-soft)' : 'var(--bg)', borderRadius: 6 }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 8 }}>
                      <span style={{ fontSize: 13, fontWeight: 500 }}>{row.p.name}</span>
                      <span className="mono" style={{ fontSize: 13, color: flag ? 'var(--neg)' : 'var(--ink)' }}>{row.sens.toFixed(2)}</span>
                    </div>
                    <div style={{ height: 4, background: 'var(--rule-soft)', borderRadius: 2 }}>
                      <div style={{ width: `${row.sens * 100}%`, height: '100%', background: flag ? 'var(--neg)' : 'var(--ink)', borderRadius: 2, transition: 'width 300ms' }} />
                    </div>
                    <span className="label" style={{ marginTop: 6, display: 'block', color: flag ? 'var(--neg)' : undefined }}>
                      {flag ? `⚠ flips around w=${row.flipAt?.toFixed(1) ?? '?'}` : row.sens > 0.15 ? 'medium impact' : 'low impact'}
                    </span>
                  </div>
                )
              })}
            </div>
          </section>
        </div>
      </div>
    </div>
  )
}

function BlindOverlay({ data, onScoreUpdate, onClose }) {
  const [paramIdx, setParamIdx] = useState(0)
  const [revealed, setRevealed] = useState(false)
  const params = data.parameters
  const param = params[paramIdx]

  useEffect(() => {
    const k = e => { if (e.key === 'Escape') onClose() }
    window.addEventListener('keydown', k); return () => window.removeEventListener('keydown', k)
  }, [onClose])

  if (!param) {
    return (
      <div className="overlay-bg" onClick={onClose}>
        <div className="overlay-card" onClick={e => e.stopPropagation()} style={{ width: 520, padding: 40, textAlign: 'center' }}>
          <span className="label">no parameters yet</span>
          <p style={{ marginTop: 12, fontSize: 14, color: 'var(--ink-soft)' }}>Add some considerations first.</p>
          <button className="btn btn-primary" onClick={onClose} style={{ marginTop: 18 }}>OK</button>
        </div>
      </div>
    )
  }
  const shuffled = [...data.options].sort((a, b) => ((a.id.charCodeAt(0) + param.id.charCodeAt(0)) % 7) - ((b.id.charCodeAt(0) + param.id.charCodeAt(0)) % 7))
  const scoredCount = shuffled.filter(o => data.scores.find(s => s.option_id === o.id && s.parameter_id === param.id && s.value != null)).length

  return (
    <div className="overlay-bg" onClick={onClose}>
      <div className="overlay-card" onClick={e => e.stopPropagation()} style={{ width: 840, maxWidth: '95vw' }}>
        <div style={{ padding: '20px 32px 16px', borderBottom: '1px solid var(--rule)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', position: 'sticky', top: 0, background: 'var(--bg)' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <Pill color="var(--hi)">blind mode</Pill>
            <span className="label">{paramIdx + 1} of {params.length}</span>
            <div style={{ display: 'flex', gap: 3 }}>
              {params.map((_, i) => <div key={i} style={{ width: 20, height: 3, background: i <= paramIdx ? 'var(--accent)' : 'var(--rule)', borderRadius: 1 }} />)}
            </div>
          </div>
          <button className="iconbtn" onClick={onClose}>×</button>
        </div>
        <div style={{ padding: '28px 32px 40px' }}>
          <span className="label" style={{ color: 'var(--hi)' }}>anti-bias · halo-effect killer</span>
          <h2 style={{ margin: '8px 0 6px', fontSize: 26, fontWeight: 500, letterSpacing: '-0.01em' }}>Score {param.name} across all options. Names hidden.</h2>
          <p style={{ margin: '0 0 24px', fontSize: 13, lineHeight: 1.6, color: 'var(--ink-soft)', maxWidth: 580 }}>
            Score this one thing for every option at once. Names are hidden — only raw evidence is shown. Reveal at the end: do your scores match your gut?
          </p>
          <div style={{ padding: '14px 18px', background: 'var(--bg-inset)', border: '1px solid var(--rule)', borderRadius: 6, display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
            <div>
              <span className="label">now scoring</span>
              <div style={{ marginTop: 2, fontSize: 22, fontWeight: 500 }}>{param.name}</div>
              <div style={{ fontSize: 11, color: 'var(--ink-soft)', marginTop: 2 }}>weight {param.weight} · {param.input_type || 'text'}{param.unit ? ` · ${param.unit}` : ''}</div>
            </div>
            <span className="label">{scoredCount}/{shuffled.length} scored</span>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {shuffled.map((o, i) => {
              const score = data.scores.find(s => s.option_id === o.id && s.parameter_id === param.id)
              return <BlindCard key={o.id} letter={String.fromCharCode(65 + i)} option={o} score={score} param={param} revealed={revealed}
                onScore={v => onScoreUpdate(o.id, param.id, { value: v })}
                onRaw={v => onScoreUpdate(o.id, param.id, { notes: v })} />
            })}
          </div>
          <div style={{ marginTop: 24, padding: '14px 18px', background: 'var(--bg-soft)', borderRadius: 6, display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
            <div style={{ fontSize: 12, color: 'var(--ink-soft)' }}>
              <strong style={{ color: 'var(--ink)' }}>Tip:</strong> if scored gut feel doesn't match your originally-named pick, that's the bias.
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              <button className="btn btn-outline btn-sm" onClick={() => setRevealed(r => !r)}>{revealed ? 'Hide names' : 'Reveal names'}</button>
              <button className="btn btn-outline btn-sm" disabled={paramIdx === 0} onClick={() => { setParamIdx(i => i - 1); setRevealed(false) }}>← prev</button>
              {paramIdx < params.length - 1
                ? <button className="btn btn-primary btn-sm" onClick={() => { setParamIdx(i => i + 1); setRevealed(false) }}>Next →</button>
                : <button className="btn btn-primary btn-sm" onClick={onClose}>Done</button>
              }
            </div>
          </div>
        </div>
      </div>
    </div>
  )
}

function BlindCard({ letter, option, score, param, revealed, onScore, onRaw }) {
  const [editingRaw, setEditingRaw] = useState(false)
  const hasRaw = score?.notes != null && score.notes !== ''
  const hasValue = score?.value != null
  return (
    <div style={{ padding: '16px 20px', border: `1px solid ${hasValue ? 'var(--rule)' : 'var(--hi)'}`, background: hasValue ? 'var(--bg)' : 'var(--hi-soft)', borderRadius: 6, display: 'grid', gridTemplateColumns: '52px 1fr auto', gap: 18, alignItems: 'center' }}>
      <div style={{ width: 44, height: 44, background: revealed ? 'var(--accent)' : (hasValue ? 'var(--bg-inset)' : 'var(--hi)'), borderRadius: 6, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18, fontWeight: 600, color: revealed ? 'var(--bg)' : (hasValue ? 'var(--ink)' : 'var(--bg)'), transition: 'all 220ms' }}>
        {revealed ? option.name?.charAt(0).toUpperCase() : letter}
      </div>
      <div style={{ minWidth: 0 }}>
        <span className="label">{revealed ? option.name : 'option ' + letter}</span>
        <div style={{ marginTop: 4 }}>
          {editingRaw
            ? <RawInput value={score?.notes} unit={param.unit} type={param.input_type} options={param.options} onChange={v => { onRaw(v); setEditingRaw(false) }} />
            : <div onClick={() => setEditingRaw(true)} style={{ fontSize: 16, fontStyle: hasRaw ? 'italic' : 'normal', cursor: 'text', minHeight: 22 }}>
                {hasRaw ? `"${score.notes}${param.unit ? ' ' + param.unit : ''}"` : <span style={{ color: 'var(--ink-faint)' }}>+ add evidence</span>}
              </div>
          }
        </div>
      </div>
      {hasValue ? (
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{ textAlign: 'right' }}>
            <span className="mono" style={{ fontSize: 22, fontWeight: 500, color: 'var(--accent)' }}>{Number(score.value).toFixed(1)}</span>
            <div style={{ marginTop: 2 }}><span className="label">scored</span></div>
          </div>
          <button className="iconbtn" onClick={() => onScore(null)} title="clear">×</button>
        </div>
      ) : (
        <div style={{ display: 'flex', gap: 4 }}>
          {[0, 2.5, 5, 7.5, 10].map(v => (
            <button key={v} onClick={() => onScore(v)} className="mono"
              style={{ padding: '6px 11px', background: 'var(--bg)', border: '1px solid var(--rule)', fontSize: 11, borderRadius: 4, color: 'var(--ink)' }}
              onMouseEnter={e => { e.currentTarget.style.background = 'var(--ink)'; e.currentTarget.style.color = 'var(--bg)' }}
              onMouseLeave={e => { e.currentTarget.style.background = 'var(--bg)'; e.currentTarget.style.color = 'var(--ink)' }}
            >{v}</button>
          ))}
        </div>
      )}
    </div>
  )
}

function App() {
  const [decisions, setDecisions] = useState([])
  const [selectedId, setSelectedId] = useState(null)
  const [decisionData, setDecisionData] = useState({ parameters: [], options: [], scores: [] })
  const [loading, setLoading] = useState(true)
  const [configError, setConfigError] = useState(false)
  const [mode, setMode] = useState(null)

  useEffect(() => {
    const accent = localStorage.getItem('sigma_accent') || 'green'
    const a = ACCENT_OPTIONS.find(x => x.name === accent) || ACCENT_OPTIONS[0]
    applyAccent(a.hue)
  }, [])

  useEffect(() => {
    if (supabaseInitError) { setConfigError(true); setLoading(false); return }
    loadDecisions()
  }, [])

  useEffect(() => {
    if (selectedId) loadDecisionDetail(selectedId)
  }, [selectedId])

  async function loadDecisions() {
    setLoading(true)
    const { data: decs } = await supabase.from('sigma_decisions').select('*')
      .neq('status', 'archived').order('updated_at', { ascending: false })
    if (!decs || decs.length === 0) { setDecisions([]); setLoading(false); return }
    const ids = decs.map(d => d.id)
    const [pRes, oRes, sRes] = await Promise.all([
      supabase.from('sigma_parameters').select('*').in('decision_id', ids).order('display_order'),
      supabase.from('sigma_options').select('*').in('decision_id', ids).order('display_order'),
      supabase.from('sigma_scores').select('*, sigma_options!inner(decision_id)').in('sigma_options.decision_id', ids),
    ])
    const enriched = decs.map(d => ({
      ...d,
      _parameters: (pRes.data || []).filter(p => p.decision_id === d.id),
      _options:    (oRes.data || []).filter(o => o.decision_id === d.id),
      _scores:     (sRes.data || []).filter(s => s.sigma_options?.decision_id === d.id),
    }))
    setDecisions(enriched)
    setLoading(false)
  }

  async function loadDecisionDetail(id) {
    const [pRes, oRes, sRes] = await Promise.all([
      supabase.from('sigma_parameters').select('*').eq('decision_id', id).order('display_order'),
      supabase.from('sigma_options').select('*').eq('decision_id', id).order('display_order'),
      supabase.from('sigma_scores').select('*, sigma_options!inner(decision_id)').eq('sigma_options.decision_id', id),
    ])
    setDecisionData({ parameters: pRes.data || [], options: oRes.data || [], scores: sRes.data || [] })
  }

  async function createDecision() {
    const { data } = await supabase.from('sigma_decisions').insert({ title: '', type: 'custom', status: 'active' }).select().single()
    if (data) {
      setDecisions([{ ...data, _parameters: [], _options: [], _scores: [] }, ...decisions])
      setSelectedId(data.id)
      setDecisionData({ parameters: [], options: [], scores: [] })
    }
  }

  async function updateDecisionTitle(title) {
    setDecisions(decisions.map(d => d.id === selectedId ? { ...d, title } : d))
    await supabase.from('sigma_decisions').update({ title }).eq('id', selectedId)
  }

  async function addParameter(name) {
    const { data } = await supabase.from('sigma_parameters')
      .insert({ decision_id: selectedId, name, weight: 5.0, display_order: decisionData.parameters.length, input_type: 'text' })
      .select().single()
    if (data) setDecisionData(prev => ({ ...prev, parameters: [...prev.parameters, data] }))
  }

  async function updateParameter(id, fields) {
    setDecisionData(prev => ({ ...prev, parameters: prev.parameters.map(p => p.id === id ? { ...p, ...fields } : p) }))
    await supabase.from('sigma_parameters').update(fields).eq('id', id)
  }

  async function deleteParameter(id) {
    setDecisionData(prev => ({ ...prev, parameters: prev.parameters.filter(p => p.id !== id), scores: prev.scores.filter(s => s.parameter_id !== id) }))
    await supabase.from('sigma_parameters').delete().eq('id', id)
  }

  async function addOption(name) {
    const { data } = await supabase.from('sigma_options')
      .insert({ decision_id: selectedId, name, display_order: decisionData.options.length })
      .select().single()
    if (data) setDecisionData(prev => ({ ...prev, options: [...prev.options, data] }))
  }

  async function updateOption(id, fields) {
    setDecisionData(prev => ({ ...prev, options: prev.options.map(o => o.id === id ? { ...o, ...fields } : o) }))
    await supabase.from('sigma_options').update(fields).eq('id', id)
  }

  async function deleteOption(id) {
    setDecisionData(prev => ({ ...prev, options: prev.options.filter(o => o.id !== id), scores: prev.scores.filter(s => s.option_id !== id) }))
    await supabase.from('sigma_options').delete().eq('id', id)
  }

  async function updateScore(optionId, parameterId, updates) {
    const existing = decisionData.scores.find(s => s.option_id === optionId && s.parameter_id === parameterId)
    if (existing) {
      const merged = { ...existing, ...updates }
      if (merged.value == null && (!merged.notes || merged.notes === '')) {
        setDecisionData(prev => ({ ...prev, scores: prev.scores.filter(s => s.id !== existing.id) }))
        await supabase.from('sigma_scores').delete().eq('id', existing.id)
        return
      }
      setDecisionData(prev => ({ ...prev, scores: prev.scores.map(s => s.id === existing.id ? merged : s) }))
      await supabase.from('sigma_scores').update(updates).eq('id', existing.id)
    } else {
      const isEmpty = updates.value == null && (!updates.notes || updates.notes === '')
      if (isEmpty) return
      const { data } = await supabase.from('sigma_scores')
        .insert({ option_id: optionId, parameter_id: parameterId, ...updates }).select().single()
      if (data) setDecisionData(prev => ({ ...prev, scores: [...prev.scores, data] }))
    }
  }

  function goHome() { setSelectedId(null); setMode(null); loadDecisions() }
  const selectedDecision = decisions.find(d => d.id === selectedId)

  if (configError) {
    return (
      <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 32 }}>
        <div style={{ maxWidth: 480 }}>
          <div style={{ fontSize: 40, color: 'var(--accent)' }}>Σ</div>
          <p className="label">configuration required</p>
          <p style={{ fontSize: 14, lineHeight: 1.6 }}>Supabase config error: {supabaseInitError}</p>
        </div>
      </div>
    )
  }

  return (
    <div style={{ minHeight: '100vh' }}>
      <TopHeader
        middle={selectedDecision
          ? <span className="label">{selectedDecision.type || 'custom'} · {completeness(decisionData.parameters, decisionData.options, decisionData.scores).filled}/{completeness(decisionData.parameters, decisionData.options, decisionData.scores).total} considered</span>
          : <span className="label">HOME</span>
        }
        onHome={goHome}
        onNew={createDecision}
      />

      {selectedId === null ? (
        <Home decisions={decisions} onOpen={setSelectedId} onNew={createDecision} loading={loading} />
      ) : selectedDecision ? (
        <DecisionView
          decision={selectedDecision}
          data={decisionData}
          onBack={goHome}
          onTitleUpdate={updateDecisionTitle}
          paramHandlers={{ onAdd: addParameter, onUpdate: updateParameter, onDelete: deleteParameter }}
          optionHandlers={{ onAdd: addOption, onUpdate: updateOption, onDelete: deleteOption }}
          onScoreUpdate={updateScore}
          onOpenMode={setMode}
        />
      ) : (
        <div style={{ padding: '40px 28px' }}><span className="label">loading…</span></div>
      )}

      {selectedId && mode === 'whatif' && <WhatIfOverlay data={decisionData} onClose={() => setMode(null)} />}
      {selectedId && mode === 'blind'  && <BlindOverlay  data={decisionData} onScoreUpdate={updateScore} onClose={() => setMode(null)} />}

      <footer style={{ borderTop: '1px solid var(--rule)', padding: '14px 28px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <span className="label">Σ Sigma · v0.5 trajectory</span>
        <span className="label">decisions, decomposed</span>
      </footer>
    </div>
  )
}

const root = createRoot(document.getElementById('root'))
root.render(<App />)
</script>
</body>
</html>
